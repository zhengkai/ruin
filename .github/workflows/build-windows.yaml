name: Build Windows Release

on:
  push:
    branches:
      - master

concurrency:
  group: build-windows
  cancel-in-progress: true

defaults:
  run:
    shell: powershell

env:
  CC: clang
  CXX: clang++
  CMAKE_VERSION: "4.1.2"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:

      - name: Cache CMake ${{ env.CMAKE_VERSION }}
        id: cache-cmake
        uses: actions/cache@v4
        with:
          path: cmake-portable
          key: cmake-${{ env.CMAKE_VERSION }}

      - name: Download CMake ${{ env.CMAKE_VERSION }}
        if: steps.cache-cmake.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri "https://github.com/Kitware/CMake/releases/download/v$env:CMAKE_VERSION/cmake-$env:CMAKE_VERSION-windows-x86_64.zip" -OutFile cmake.zip
          Expand-Archive cmake.zip -DestinationPath cmake-portable
          Remove-Item cmake.zip
          .\cmake-portable\cmake-$($env:CMAKE_VERSION)-windows-x86_64\bin\cmake.exe --version

      - name: Save CMake Cache
        uses: actions/cache/save@v4
        with:
          path: cmake-portable
          key: cmake-${{ env.CMAKE_VERSION }}

      - name: Checkout
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.RUIN_TOKEN }}@github.com/zhengkai/ruin.git" .

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: tool/vcpkg
          key: vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Clone vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          cd tool
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install --triplet x64-windows

      - name: Save vcpkg Cache
        uses: actions/cache/save@v4
        with:
          path: tool/vcpkg
          key: vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Configure CMake
        run: |
          mkdir -p build
          .\cmake-portable\cmake-$($env:CMAKE_VERSION)-windows-x86_64\bin\cmake.exe -B build -DCMAKE_TOOLCHAIN_FILE="$PWD\tool\vcpkg\scripts\buildsystems\vcpkg.cmake" -DCMAKE_BUILD_TYPE=Release

      - name: Build with CMake
        run: |
          .\cmake-portable\cmake-$($env:CMAKE_VERSION)-windows-x86_64\bin\cmake.exe --build build --config Release -- /m

      - name: Download asset
        run: |
          git clone --depth 1 "https://github.com/zhengkai/ruin-asset.git" asset
          node misc\copy-asset.mjs

      - name: Try run
        run: |
          cd build\Release
          .\ruin.exe --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ruin-windows
          path: build\Release\*

      - name: Delete old daily tag
        run: |
          try { git tag -d daily } catch {}
          try { git push origin :refs/tags/daily } catch {}

      - name: Recreate daily tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag daily
          git push origin daily --force

      - name: Zip build output
        run: |
          cd build\Release
          7z a ..\..\ruin-win.zip .\*

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily
          name: Daily Build
          prerelease: true
          body: "Latest daily build."
          files: ruin-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.RUIN_TOKEN }}
